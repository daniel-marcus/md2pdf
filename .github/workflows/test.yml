name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # keep in sync with the pandoc version used to generate tests/golden/
      PANDOC_VERSION: 3.9.0.2
      PANDOC_DEB_SHA256: ce4ac48f48aa7eadc1f5dbdf3449a1739f188ecb8c5421c5adc070fe7479e567
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pandoc
        run: |
          curl -fsSL -o pandoc.deb "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb"
          echo "${PANDOC_DEB_SHA256}  pandoc.deb" | sha256sum --check
          sudo dpkg -i pandoc.deb

      - name: Run tests
        run: ./run/test.sh
